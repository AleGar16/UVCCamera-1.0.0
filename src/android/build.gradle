android {
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 34
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    // Use the published libausbc module directly.
    implementation 'com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.2.8'
}
