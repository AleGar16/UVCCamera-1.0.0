android {
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 34
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    // Prefer the library module artifact documented by AUSBC itself.
    // The top-level artifact can pull in a different packaging/layout than
    // the actual camera library module and has shown unstable behavior on open.
    implementation('com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.2.7') {
        exclude group: 'com.gyf.immersionbar', module: 'immersionbar'
        exclude group: 'com.zlc.glide', module: 'webpdecoder'
    }
}
