android {
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 34
    }
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    // 3.2.8 removes demo-oriented transitive dependencies from libausbc,
    // which helps avoid resolution failures on restricted build servers.
    implementation 'com.github.jiangdongguo:AndroidUSBCamera:3.2.8'
}
